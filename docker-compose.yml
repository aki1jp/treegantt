services:
  frontend:
    image: treegantt-frontend:prod
    build: ./frontend
    ports:
      - '${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}'
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
    depends_on:
      - api

  api:
    image: treegantt-api:prod
    build: ./api
    ports:
      - '${PORT:-4000}:${PORT:-4000}'
      - '${WS_PORT:-4001}:${WS_PORT:-4001}'
    volumes:
      - api_data:/app/data
    environment:
      - DB_PATH=/app/data/treegantt.db
      - PORT=${PORT:-4000}
      - WS_PORT=${WS_PORT:-4001}
      - LDAP_ENABLED=false
      - CORS_ORIGIN=${CORS_ORIGIN:-*}

volumes:
  api_data:
