services:
  frontend:
    image: treegantt-frontend:prod
    build: ./frontend
    ports:
      - '${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}'
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
    depends_on:
      api:
        condition: service_healthy

  api:
    image: treegantt-api:prod
    build: ./api
    ports:
      - '${PORT:-4000}:${PORT:-4000}'
      - '${WS_PORT:-4001}:${WS_PORT:-4001}'
    volumes:
      - ./api/data:/app/data
    environment:
      - DB_PATH=/app/data/treegantt.db
      - PORT=${PORT:-4000}
      - WS_PORT=${WS_PORT:-4001}
      - LDAP_ENABLED=false
      # 既定は '*'（社内LAN運用の互換維持）。インターネット公開する本番では
      # .env で CORS_ORIGIN=https://your-domain.example のように具体オリジンを設定する
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    healthcheck:
      # node:20-slim には curl が同梱されていないため、Node組み込みの fetch で /health を叩く
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:'+(process.env.PORT||4000)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
