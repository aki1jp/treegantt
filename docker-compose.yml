version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - api

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
      - '4001:4001'
    environment:
      - DB_PATH=/app/data/treegantt.db
      - PORT=4000
      - WS_PORT=4001
      - LDAP_ENABLED=false
      - CORS_ORIGIN=*
    volumes:
      - ./api/data:/app/data

  # 開発ツール（通常起動時は除外）
  # docker compose --profile dev-tools up
  db-ui:
    image: coleifer/sqlite-web
    ports:
      - '8888:8080'
    volumes:
      - ./api/data:/data
    command: sqlite_web --host 0.0.0.0 /data/treegantt.db
    profiles:
      - dev-tools
