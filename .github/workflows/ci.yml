name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  api:
    name: API (typecheck / lint / test+coverage / audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      # カバレッジ閾値（vitest.config.ts の coverage.thresholds）を満たさない場合 exit 1 になる。
      - run: npm run test:coverage
      - run: npm audit --audit-level=high

  frontend:
    name: Frontend (typecheck / lint / test+coverage / audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      # カバレッジ閾値（vite.config.ts の test.coverage.thresholds）を満たさない場合 exit 1 になる。
      - run: npm run test:coverage
      - run: npm audit --omit=dev --audit-level=high

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            api/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json
      # ビジュアルリグレッション（§17.2）の日本語UI描画をランナー既定フォント（CJKグリフ非対応）で
      # 「豆腐」化させないために導入。ベースライン画像はローカル（Noto Sans JP）で生成しているため
      # 完全なグリフレベル一致は保証しないが、閾値（maxDiffPixelRatio）で吸収する想定。
      - name: Install CJK fonts (for visual regression, §17.2)
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - name: Install api dependencies
        working-directory: api
        run: npm ci
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci
      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test
        env:
          # テスト間の汚染を避けるため、開発用DBとは別の専用パスを使う。
          DB_PATH: ${{ runner.temp }}/treegantt-e2e.db
          # 定期バックアップ（api/src/db/backup.ts）を止める。起動時の1回分の
          # バックアップは runner.temp に残るが、ジョブ終了で破棄されるため実害なし。
          BACKUP_INTERVAL_HOURS: '0'
      - name: Upload Playwright traces/screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore
